name: Template sync check

on:
  push:
  pull_request:

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check CLAUDE.md ↔ HTML ↔ README feature parity
        run: node scripts/check-template-sync.mjs
