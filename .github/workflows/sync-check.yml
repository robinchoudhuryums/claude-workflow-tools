name: Template sync check

on:
  push:
  pull_request:

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check generated command files are current
        run: node scripts/gen-commands.mjs --check
      - name: Check HTML console JS (syntax, builders, behavior)
        run: node scripts/check-html.mjs
      - name: Check CLAUDE.md ↔ HTML ↔ README feature parity
        run: node scripts/check-template-sync.mjs
      - name: Guard regression test (fails closed on injected drift)
        run: node tests/guard.test.mjs
      - name: Metrics renderer regression test
        run: node tests/render-metrics.test.mjs
      - name: SessionStart context hook regression test
        run: node tests/cycle-context.test.mjs
